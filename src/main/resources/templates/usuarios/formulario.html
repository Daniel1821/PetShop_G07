<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="container mt-4">

<h1>Usuario</h1>

<form th:action="@{/usuarios/guardar}"
      th:object="${usuario}"
      method="post">

    <input type="hidden" th:field="*{idUsuario}">

    <div class="mb-3">
        <label>Username</label>
        <input class="form-control" type="text" th:field="*{username}" required>
    </div>

    <div class="mb-3">
        <label>Password</label>
        <input class="form-control" type="text" th:field="*{password}" required>
    </div>

    <div class="mb-3">
        <label>Nombre</label>
        <input class="form-control" type="text" th:field="*{nombre}" required>
    </div>

    <div class="mb-3">
        <label>Apellidos</label>
        <input class="form-control" type="text" th:field="*{apellidos}" required>
    </div>

    <div class="mb-3">
        <label>Correo</label>
        <input class="form-control" type="email" th:field="*{correo}">
    </div>

    <div class="mb-3">
        <label>Teléfono</label>
        <input class="form-control" type="text" th:field="*{telefono}">
    </div>

    <div class="mb-3">
        <label>Ruta Imagen</label>
        <input class="form-control" type="text" th:field="*{rutaImagen}">
    </div>

    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" th:field="*{activo}">
        <label class="form-check-label">Activo</label>
    </div>

    <button class="btn btn-success" type="submit">
        Guardar
    </button>

    <a th:href="@{/usuarios}" class="btn btn-secondary">
        Cancelar
    </a>

</form>

</body>
</html>
