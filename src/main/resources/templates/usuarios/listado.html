<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuarios</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="container mt-5">

<h1>Usuarios</h1>

<a th:href="@{/usuarios/nuevo}" class="btn btn-primary mb-3">
    Agregar usuario
</a>

<table class="table table-striped table-hover">

    <thead>
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Nombre</th>
        <th>Apellidos</th>
        <th>Correo</th>
        <th>Activo</th>
        <th>Acciones</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="usuario : ${usuarios}">

        <td th:text="${usuario.idUsuario}"></td>

        <td th:text="${usuario.username}"></td>

        <td th:text="${usuario.nombre}"></td>

        <td th:text="${usuario.apellidos}"></td>

        <td th:text="${usuario.correo}"></td>

        <td th:text="${usuario.activo}"></td>

        <td>

            <a th:href="@{/usuarios/modificar/{id}(id=${usuario.idUsuario})}"
               class="btn btn-warning btn-sm">
                Editar
            </a>

            <a th:href="@{/usuarios/eliminar/{id}(id=${usuario.idUsuario})}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('¿Eliminar usuario?');">
                Eliminar
            </a>

        </td>

    </tr>

    </tbody>

</table>

<a th:href="@{/}" class="btn btn-secondary">
    Volver
</a>

</body>
</html>
