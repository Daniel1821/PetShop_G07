<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Categorías</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="container mt-5">

<h1>Categorías</h1>

<a th:href="@{/categorias/nuevo}" class="btn btn-primary mb-3">
    Agregar categoría
</a>

<table class="table table-striped table-hover">

    <thead>
    <tr>
        <th>ID</th>
        <th>Descripción</th>
        <th>Activo</th>
        <th>Acciones</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="categoria : ${categorias}">

        <td th:text="${categoria.idCategoria}"></td>

        <td th:text="${categoria.descripcion}"></td>

        <td th:text="${categoria.activo}"></td>

        <td>

            <a th:href="@{/categorias/modificar/{id}(id=${categoria.idCategoria})}"
               class="btn btn-warning btn-sm">
                Editar
            </a>

            <a th:href="@{/categorias/eliminar/{id}(id=${categoria.idCategoria})}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('¿Eliminar categoría?');">
                Eliminar
            </a>

        </td>

    </tr>

    </tbody>

</table>

<a th:href="@{/}" class="btn btn-secondary">
    Volver
</a>

</body>
</html>
