<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Categoría</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h1>Categoría</h1>

<form th:action="@{/categorias/guardar}" th:object="${categoria}" method="post">

    <input type="hidden" th:field="*{idCategoria}">

    <div class="mb-3">
        <label>Descripción</label>
        <input type="text" th:field="*{descripcion}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Ruta imagen</label>
        <input type="text" th:field="*{rutaImagen}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Activo</label>
        <input type="checkbox" th:field="*{activo}">
    </div>

    <button type="submit" class="btn btn-success">Guardar</button>
    <a th:href="@{/categorias}" class="btn btn-secondary">Cancelar</a>

</form>

</body>
</html>
