<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h1>Producto</h1>

<form th:action="@{/productos/guardar}" th:object="${producto}" method="post">

    <input type="hidden" th:field="*{idProducto}">

    <div class="mb-3">
        <label>Descripción</label>
        <input type="text" th:field="*{descripcion}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Detalle</label>
        <textarea th:field="*{detalle}" class="form-control"></textarea>
    </div>

    <div class="mb-3">
        <label>Precio</label>
        <input type="number" step="0.01" th:field="*{precio}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Existencias</label>
        <input type="number" th:field="*{existencias}" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Ruta imagen</label>
        <input type="text" th:field="*{rutaImagen}" class="form-control">
    </div>

    <div class="mb-3">
        <label>Activo</label>
        <input type="checkbox" th:field="*{activo}">
    </div>

    <button type="submit" class="btn btn-success">Guardar</button>
    <a href="/productos" class="btn btn-secondary">Cancelar</a>

</form>

</body>
</html>
