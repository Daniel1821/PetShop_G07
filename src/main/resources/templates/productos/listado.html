<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="container mt-5">

<h1>Productos</h1>

<a th:href="@{/productos/nuevo}" class="btn btn-primary mb-3">
    Agregar producto
</a>

<table class="table table-striped table-hover">

    <thead>

    <tr>
        <th>ID</th>
        <th>Descripción</th>
        <th>Precio</th>
        <th>Existencias</th>
        <th>Activo</th>
        <th>Acciones</th>
    </tr>

    </thead>

    <tbody>

    <tr th:each="producto : ${productos}">

        <td th:text="${producto.idProducto}"></td>

        <td th:text="${producto.descripcion}"></td>

        <td th:text="${producto.precio}"></td>

        <td th:text="${producto.existencias}"></td>

        <td th:text="${producto.activo}"></td>

        <td>

            <a th:href="@{/productos/modificar/{id}(id=${producto.idProducto})}"
               class="btn btn-warning btn-sm">
                Editar
            </a>

            <a th:href="@{/productos/eliminar/{id}(id=${producto.idProducto})}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('¿Desea eliminar este producto?');">
                Eliminar
            </a>

        </td>

    </tr>

    </tbody>

</table>

<a th:href="@{/}" class="btn btn-secondary">
    Volver al inicio
</a>

</body>
</html>
