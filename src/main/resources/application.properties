spring.application.name=petshop

#Para eliminar el banner de spring al inicio
spring.main.banner-mode=off

#Para evitar el uso de cache en desarrollo... en produccion SI
spring.thymeleaf.cache=false

#Datos de conexion a MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/petshop?useSSL=false&serverTimezone=America/Costa_Rica&allowPublicKeyRetrieval=true
spring.datasource.username=usuario_prueba
spring.datasource.password=Usuar1o_Clave.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Configuracion de Hibernate/JPA

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

#Para definir el puerto donde escucha el servidor web
server.port=80

#mostrar información en el log
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.petshop=INFO
